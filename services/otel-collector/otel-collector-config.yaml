# OpenTelemetry Collector configuration
# Receives telemetry from all UAIP workloads, normalises schemas,
# and exports to Azure Monitor / Log Analytics.

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"
      http:
        endpoint: "0.0.0.0:4318"

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024

  # Normalise resource attributes across providers
  transform:
    trace_statements:
      - context: resource
        statements:
          # Ensure every span has a service.namespace
          - set(attributes["service.namespace"], "uaip") where attributes["service.namespace"] == nil
    metric_statements:
      - context: resource
        statements:
          - set(attributes["service.namespace"], "uaip") where attributes["service.namespace"] == nil
    log_statements:
      - context: resource
        statements:
          - set(attributes["service.namespace"], "uaip") where attributes["service.namespace"] == nil

  # Add memory limiter to avoid OOM
  memory_limiter:
    check_interval: 5s
    limit_mib: 400
    spike_limit_mib: 100

exporters:
  # Azure Monitor via Application Insights connection string
  azuremonitor:
    connection_string: ${APPLICATIONINSIGHTS_CONNECTION_STRING}

  # Debug exporter for local development
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: "0.0.0.0:13133"
  zpages:
    endpoint: "0.0.0.0:55679"

service:
  extensions: [health_check, zpages]
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [azuremonitor, debug]
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [azuremonitor, debug]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, transform, batch]
      exporters: [azuremonitor, debug]
